<!-- Mobile Menu Button (Add this to your nav section) -->
<button class="mobile-menu-btn" id="mobileMenuBtn">
    <i class="fas fa-bars"></i>
</button>

<!-- Mobile Menu (Add this after the header) -->
<div class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" id="mobileMenuClose">
        <i class="fas fa-times"></i>
    </button>
    <div class="mobile-menu-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="departments.html">Department</a>
        <a href="doctors.html">Doctors</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
        <a href="health-library/index.html">Health Library</a>
        <a href="doctors.html">Appointment</a>
        <a href="profile.html">My Profile</a>
        <a href="settings.html">Settings</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<!-- Mobile Menu JavaScript (Add this before the closing body tag) -->
<script>
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuClose = document.getElementById('mobileMenuClose');
    const overlay = document.getElementById('overlay');

    mobileMenuBtn.addEventListener('click', function() {
        mobileMenu.classList.add('active');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    });

    mobileMenuClose.addEventListener('click', function() {
        mobileMenu.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = 'auto';
    });

    overlay.addEventListener('click', function() {
        mobileMenu.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = 'auto';
    });
</script>
