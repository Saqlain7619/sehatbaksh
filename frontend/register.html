<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #2b8ae2, #2b6fd3);
  font-family:sans-serif;
}

.card {
  background:#fff;
  padding:35px;
  border-radius:20px;
  width:360px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2 { text-align:center; margin-bottom:20px; }

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:#2b8ae2;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#1e6fcc; }

.bottom { text-align:center; margin-top:10px; }
.bottom a { color:#2b8ae2; text-decoration:none; }
</style>

</head>
<body>

<div class="card">
  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="registerAdmin()">Register</button>

  <div class="bottom">
    Already have account? <a href="login.html">Login</a>
  </div>
</div>

<script>
async function registerAdmin() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:5000/api/users/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();

  if(res.ok){
    alert("Registered Successfully");

    // 🔥 REGISTER ke baad login page
    window.location.href = "login.html";

  } else {
    alert(data.error || "Registration failed");
  }
}
</script>

</body>
</html>
