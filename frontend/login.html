<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sehat Bakhsh Login</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #2b8ae2, #2b6fd3);
}

.card {
  background:#fff;
  padding:35px;
  border-radius:20px;
  width:360px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo {
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:#2b8ae2;
}

h2 {
  text-align:center;
  margin:10px 0 25px;
}

label {
  font-size:14px;
  color:#444;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0 15px;
  border-radius:8px;
  border:1px solid #ccc;
}

input:focus {
  outline:none;
  border-color:#2b8ae2;
}

.row {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:15px;
}

button {
  width:100%;
  padding:12px;
  background:#2b8ae2;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#1e6fcc; }

.divider {
  text-align:center;
  margin:15px 0;
  color:#888;
}

.social {
  border:1px solid #ddd;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:10px;
  cursor:pointer;
}

.bottom {
  text-align:center;
  font-size:14px;
}

.bottom a { color:#2b8ae2; text-decoration:none; }
</style>

</head>
<body>

<div class="card">
  <div class="logo">Sehat Bakhsh</div>
  <h2>Welcome Back</h2>

  <label>Email</label>
  <input type="email" id="email" placeholder="Enter email">

  <label>Password</label>
  <input type="password" id="password" placeholder="Enter password">

  <div class="row">
    <span><input type="checkbox"> Remember</span>
    <span>Forgot?</span>
  </div>

  <button onclick="loginAdmin()">Login →</button>

  <div class="divider">Or continue with</div>

  <div class="social">Continue with Google</div>
  <div class="social">Continue with Facebook</div>

  <div class="bottom">
    Don't have account? <a href="register.html">Sign Up</a>
  </div>
</div>

<script>
async function loginAdmin() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email & password");
    return;
  }

  try {
    // 🔥 1. TRY ADMIN LOGIN
    let res = await fetch("http://localhost:5000/api/admin/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    let data = await res.json();
    console.log("Admin response:", data);
console.log("TOKEN:", data.token);
    // ✅ ADMIN LOGIN SUCCESS
    if (res.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "admin.html";
      return;
    }

    // 🔥 2. TRY USER LOGIN
    let userRes = await fetch("http://localhost:5000/api/users/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    let userData = await userRes.json();
    console.log("User response:", userData);


    // ✅ USER LOGIN SUCCESS
    if (userRes.ok) {
      localStorage.setItem("token", userData.token);
      window.location.href = "index.html";
      return;
    }

    // ❌ BOTH FAILED
    alert("Invalid email or password");

  } catch (err) {
    console.log(err);
    alert("Server error / Backend not running");
  }
}
</script>

</body>
</html>
